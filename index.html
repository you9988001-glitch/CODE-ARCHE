<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus of CODE ARCHE | #22 THIA </title>
    <style>
        :root {
            --tau-gold: #ffcc33;
            --void-deep: #030503;
            --nebula-trace: rgba(26, 77, 46, 0.15);
            --stellar-dust: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--void-deep);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            perspective: 1000px;
        }

        /* 우주 공간의 무한한 깊이감 */
        .universe-canvas {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a1f11 0%, var(--void-deep) 80%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 중심점 Tau (τ) */
        .tau-center {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--tau-gold);
            border-radius: 50%;
            box-shadow: 0 0 40px 10px var(--tau-gold);
            z-index: 10;
        }

        /* 19개의 나들목 궤도 (예술적 균형과 질서) */
        .gateways-container {
            position: relative;
            width: 800px;
            height: 800px;
            transform-style: preserve-3d;
            animation: cosmic-drift 60s infinite linear;
        }

        .gateway {
            position: absolute;
            top: 50%; left: 50%;
            width: 600px;
            height: 600px;
            border: 0.5px solid rgba(255, 204, 51, 0.08);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* 19개의 각기 다른 각도로 교차하는 나들목들 */
        /* CSS 반복문을 쓸 수 없으니 핵심적인 궤도들만 정교하게 배치함 */
        .g1 { transform: translate(-50%, -50%) rotateX(70deg) rotateY(10deg); }
        .g2 { transform: translate(-50%, -50%) rotateX(-60deg) rotateY(30deg); }
        .g3 { transform: translate(-50%, -50%) rotateX(20deg) rotateY(80deg); }
        .g4 { transform: translate(-50%, -50%) rotateZ(45deg) rotateX(40deg); }

        /* 쉼터와 예술가의 집 (정적인 점들) */
        .sanctuary {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            opacity: 0.4;
            box-shadow: 0 0 10px #fff;
        }

        .sanctuary-1 { top: 20%; left: 30%; }
        .sanctuary-2 { bottom: 25%; right: 15%; }

        /* 신비로운 기운의 흐름 */
        .ethereal-glow {
            position: absolute;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, var(--nebula-trace) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
        }

        @keyframes cosmic-drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .manifesto-overlay {
            position: absolute;
            bottom: 50px;
            right: 50px;
            text-align: right;
            font-family: 'Cinzel', serif;
            color: var(--tau-gold);
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>
    <script type="module">
        import { inject } from '@vercel/analytics';
        inject();
    </script>
</head>
<body>
    <div class="universe-canvas">
        <div class="ethereal-glow"></div>
        <div class="tau-center"></div>
        
        <div class="gateways-container">
            <div class="gateway g1"></div>
            <div class="gateway g2"></div>
            <div class="gateway g3"></div>
            <div class="gateway g4"></div>
            <div class="sanctuary sanctuary-1"></div>
            <div class="sanctuary sanctuary-2"></div>
        </div>

        <div class="manifesto-overlay">
            The 49 Nexus of CODE ARCHE<br>
             #22THIA/Sanctuary of the Artist
        </div>
    </div>
</body>
</html>
